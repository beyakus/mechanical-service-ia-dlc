name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies - shared
        run: npm ci
        working-directory: shared

      - name: Install dependencies - api
        run: npm ci
        working-directory: api

      - name: Install dependencies - app
        run: npm ci
        working-directory: app

      - name: Lint - shared
        run: npm run lint
        working-directory: shared

      - name: Lint - api
        run: npm run lint
        working-directory: api

      - name: Lint - app
        run: npm run lint
        working-directory: app

      - name: Type check - shared
        run: npm run typecheck
        working-directory: shared

      - name: Type check - api
        run: npm run typecheck
        working-directory: api

      - name: Type check - app
        run: npm run typecheck
        working-directory: app

      - name: Build - shared
        run: npm run build
        working-directory: shared

      - name: Test - shared
        run: npm test
        working-directory: shared

      - name: Build - api
        run: npm run build
        working-directory: api

      - name: Test - api
        run: npm test
        working-directory: api

      - name: Build - app
        run: npm run build
        working-directory: app

      - name: Test - app
        run: npm test
        working-directory: app
